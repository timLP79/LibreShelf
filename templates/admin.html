{{define "content"}}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h1 class="mb-1">Admin</h1>
        <p class="text-muted mb-0">Library administration and system settings</p>
    </div>
</div>

{{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}
{{if .Success}}<div class="alert alert-success">{{.Success}}</div>{{end}}

<!--
    Tools: content-heavy admin features that warrant their own page.
    Each card links to a dedicated /admin/<tool> route. Lightweight
    settings (toggles, single-field switches) belong inline on this
    page, not as drill-down tools.
-->
<section class="mb-4">
    <h2 class="h5 mb-3">Tools</h2>
    <div class="row g-3">
        <div class="col-md-6 col-lg-4">
            <div class="card h-100">
                <div class="card-body d-flex flex-column">
                    <h3 class="card-title h6">Backup and Restore</h3>
                    <p class="card-text text-muted small flex-grow-1">
                        Download a snapshot of the library database and covers, or restore from a prior backup ZIP.
                    </p>
                    <a href="/admin/backup" class="btn btn-sm align-self-start" style="background-color: #1e3a5f; color: #ffffff;">
                        Open
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{{end}}
