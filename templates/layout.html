{{define "layout"}}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} - LibreShelf</title>
    <link href="/stylesheets/bootstrap.min.css" rel="stylesheet">
    <link href="/stylesheets/style.css" rel="stylesheet">
</head>
<body>

<div class="d-flex min-vh-100">

    <!-- Sidebar -->
    <div class="d-flex flex-column p-3 sidebar">
        <div class="mb-4">
            <div class="fw-bold fs-5" style="color: #ffffff;">&#128218; LibreShelf</div>
            <div class="small" style="color: #a8c4e0; opacity: 0.7;">Staff Portal</div>
        </div>
        <nav class="nav flex-column flex-grow-1 gap-1">
            <a class="nav-link rounded" href="/">Dashboard</a>
            <a class="nav-link rounded" href="/catalog">Catalog</a>
            <a class="nav-link rounded" href="/patrons">Patrons</a>
            <a class="nav-link rounded" href="/admin">Admin</a>
            <a class="nav-link rounded" href="/kiosk">Kiosk View</a>
        </nav>
        <div class="small mt-auto pt-3 border-top border-secondary" style="color: #a8c4e0; opacity: 0.7;">
            Logged in as Staff
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        {{block "content" .}}{{end}}
    </div>

</div>

<script src="/javascripts/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
